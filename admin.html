<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | 200 Club</title><style>body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061a3a;color:#071c3b;padding:20px}.wrap{max-width:1180px;margin:auto}.card{background:white;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 12px 36px rgba(0,0,0,.2)}h1{color:white;text-transform:uppercase}input,button{font:inherit;height:40px;border-radius:10px;border:1px solid #c8d3e2;padding:0 12px}button{background:#0b57d0;color:white;font-weight:900;cursor:pointer;border:0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#eaf4ff;border-radius:14px;padding:14px;text-align:center}.stat b{font-size:28px;color:#0b57d0;display:block}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #dbe4f0;padding:9px;text-align:left;font-size:14px}th{background:#f4f7fb}.rowBtns button{margin-right:6px;height:32px}@media(max-width:760px){.stats{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>200 Club Admin</h1><div class="card"><label>Apps Script URL</label><br><input id="apiUrl" style="width:100%;margin:6px 0 12px"><label>Admin Key</label><br><input id="adminKey" style="width:100%;margin:6px 0 12px"><button id="saveBtn">Save Settings</button> <button id="loadBtn">Load Dashboard</button><p id="msg"></p></div><div class="card stats"><div class="stat"><b id="sold">0</b>Sold</div><div class="stat"><b id="held">0</b>Held</div><div class="stat"><b id="available">200</b>Available</div><div class="stat"><b id="raised">$0</b>Raised</div></div><div class="card"><button id="drawBtn">Draw Winner</button> <button id="exportBtn">Export CSV</button><p id="winner"></p></div><div class="card"><table><thead><tr><th>Square</th><th>Status</th><th>Name</th><th>Email</th><th>Phone</th><th>Amount</th><th>Time</th><th>Actions</th></tr></thead><tbody id="tbody"></tbody></table></div></div><script>let rows=[];const apiUrl=document.getElementById('apiUrl'),adminKey=document.getElementById('adminKey'),msg=document.getElementById('msg');apiUrl.value=localStorage.getItem('prpAdminApiUrl')||'';adminKey.value=localStorage.getItem('prpAdminKey')||'';document.getElementById('saveBtn').onclick=()=>{localStorage.setItem('prpAdminApiUrl',apiUrl.value.trim());localStorage.setItem('prpAdminKey',adminKey.value.trim());msg.textContent='Saved in this browser.'};async function api(action,payload={}){const res=await fetch(apiUrl.value.trim(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,adminKey:adminKey.value.trim(),...payload})});const data=await res.json();if(!data.ok)throw new Error(data.error||'Error');return data}async function load(){msg.textContent='Loading...';const data=await api('adminList');rows=data.rows||[];render();msg.textContent='Loaded.'}function render(){let sold=0,held=0;rows.forEach(r=>{if(r.status==='Paid')sold++;if(r.status==='Held'||r.status==='Pending')held++});document.getElementById('sold').textContent=sold;document.getElementById('held').textContent=held;document.getElementById('available').textContent=200-sold-held;document.getElementById('raised').textContent='$'+(sold*50).toLocaleString();const tb=document.getElementById('tbody');tb.innerHTML='';rows.sort((a,b)=>Number(a.square)-Number(b.square)).forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${r.square}</td><td>${r.status}</td><td>${r.firstName||''} ${r.lastName||''}</td><td>${r.email||''}</td><td>${r.phone||''}</td><td>${r.amount||''}</td><td>${r.timestamp||''}</td><td class="rowBtns">${r.status!=='Paid'?`<button data-release="${r.square}">Release</button>`:''}</td>`;tb.appendChild(tr)});document.querySelectorAll('[data-release]').forEach(b=>b.onclick=async()=>{await api('adminRelease',{square:b.dataset.release});await load()})}document.getElementById('loadBtn').onclick=load;document.getElementById('drawBtn').onclick=async()=>{const data=await api('drawWinner');document.getElementById('winner').textContent=`Winner: Square ${data.winner.square} - ${data.winner.firstName} ${data.winner.lastName}`};document.getElementById('exportBtn').onclick=()=>{const csv=[['Square','Status','First Name','Last Name','Email','Phone','Amount','Timestamp'],...rows.map(r=>[r.square,r.status,r.firstName,r.lastName,r.email,r.phone,r.amount,r.timestamp])].map(a=>a.map(v=>`"${String(v||'').replaceAll('"','""')}"`).join(',')).join('
');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='200-club-export.csv';a.click()};</script></body></html>
